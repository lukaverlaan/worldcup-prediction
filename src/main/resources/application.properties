spring.application.name=worldcup2026

# Database
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Optional but useful
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Server
server.port=${PORT:8080}

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Thymeleaf
spring.thymeleaf.cache=true

# Messages
spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.messages.cache-duration=0

# Score values
score.exact=3
score.winner=1
score.bonus.exact=2
score.bonus.winner=1

# api-football.com integration
apifootball.key=${APIFOOTBALL_KEY:}
apifootball.league=1
apifootball.season=2026
# Sync finished match scores every 5 minutes (in ms)
apifootball.sync.interval-ms=300000