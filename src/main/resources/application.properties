spring.application.name=worldcup2026

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/worldcup2026?createDatabaseIfNotExist=true&serverTimezone=Europe/Brussels
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# Thymeleaf
spring.thymeleaf.cache=false

# Berichten
spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.messages.cache-duration=0

# Server
server.port=8080

# Score waarden
score.exact=3
score.winner=1
score.bonus.exact=2
score.bonus.winner=1

# logging.file.name=logFile.log
