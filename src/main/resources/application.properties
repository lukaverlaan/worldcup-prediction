spring.application.name=worldcup2026

# Database
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Optional but useful
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Server
server.port=${PORT:8080}

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Thymeleaf
spring.thymeleaf.cache=true

# Messages
spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.messages.cache-duration=0

# File upload
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB

# Session — opgeslagen in database zodat gebruikers ingelogd blijven na herstart
spring.session.store-type=jdbc
spring.session.jdbc.initialize-schema=always
spring.session.timeout=30d

# Remember-me
remember-me.key=${REMEMBER_ME_KEY:fallback-dev-key}

# Score values
score.exact=3
score.winner=1

# api-football.com integration
apifootball.key=${APIFOOTBALL_KEY:}
apifootball.league=1
apifootball.season=2026
# Sync finished match scores every 5 minutes (in ms)
apifootball.sync.interval-ms=300000