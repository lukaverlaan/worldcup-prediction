<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Register')}"></head>
<body>

<div class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <i class="bi bi-trophy-fill" style="color: var(--wc-red); font-size: 2rem;"></i>
            <h1 th:text="#{register.title}">Create an account</h1>
            <p th:text="#{register.subtitle}">Join the World Cup 2026 prediction game</p>
        </div>

        <form th:action="@{/register}" method="post" th:object="${registrationForm}" class="d-flex flex-column gap-3">
            <div>
                <label for="username" class="form-label fw-semibold" th:text="#{form.username}">Username</label>
                <input type="text" id="username" th:field="*{username}"
                       class="form-control" th:classappend="${#fields.hasErrors('username')} ? 'is-invalid'"
                       th:placeholder="#{form.username}" autofocus>
                <div class="invalid-feedback" th:if="${#fields.hasErrors('username')}"
                     th:errors="*{username}"></div>
            </div>
            <div>
                <label for="email" class="form-label fw-semibold" th:text="#{form.email}">Email</label>
                <input type="email" id="email" th:field="*{email}"
                       class="form-control" th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                       placeholder="your@email.com">
                <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}"
                     th:errors="*{email}"></div>
            </div>
            <div>
                <label for="password" class="form-label fw-semibold" th:text="#{form.password}">Password</label>
                <input type="password" id="password" th:field="*{password}"
                       class="form-control" th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'"
                       placeholder="••••••••">
                <div class="invalid-feedback" th:if="${#fields.hasErrors('password')}"
                     th:errors="*{password}"></div>
            </div>
            <div>
                <label for="confirmPassword" class="form-label fw-semibold" th:text="#{form.confirm.password}">Confirm Password</label>
                <input type="password" id="confirmPassword" th:field="*{confirmPassword}"
                       class="form-control" th:classappend="${#fields.hasErrors('confirmPassword')} ? 'is-invalid'"
                       placeholder="••••••••">
                <div class="invalid-feedback" th:if="${#fields.hasErrors('confirmPassword')}"
                     th:errors="*{confirmPassword}"></div>
            </div>
            <button type="submit" class="btn btn-wc w-100 mt-2 py-2">
                <i class="bi bi-person-check me-1"></i>
                <span th:text="#{register.submit}">Create Account</span>
            </button>
        </form>

        <p class="auth-footer-note">
            <span th:text="#{register.have.account}">Already have an account?</span>
            <a th:href="@{/login}" th:text="#{register.login.link}">Sign in</a>
        </p>

        <div class="auth-lang">
            <button type="button"
                    th:class="${#locale.language == 'en'} ? 'lang-btn active' : 'lang-btn'"
                    onclick="switchLang('en')">EN</button>
            <button type="button"
                    th:class="${#locale.language == 'nl'} ? 'lang-btn active' : 'lang-btn'"
                    onclick="switchLang('nl')">NL</button>
            <button type="button"
                    th:class="${#locale.language == 'fr'} ? 'lang-btn active' : 'lang-btn'"
                    onclick="switchLang('fr')">FR</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function switchLang(lang) {
        var url = new URL(window.location.href);
        url.searchParams.set('lang', lang);
        window.location.href = url.toString();
    }
</script>
</body>
</html>
