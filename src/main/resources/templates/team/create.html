<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(#{team.create.title})}"></head>
<body class="app-body">

<div th:replace="~{fragments/layout :: sidebar}"></div>

<div class="page-wrapper">
<main class="main-container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-wc text-white py-3">
                    <h4 class="mb-0">
                        <i class="bi bi-plus-circle me-2"></i>
                        <span th:text="#{team.create.title}">Create a New Team</span>
                    </h4>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/teams/create}" method="post" th:object="${createTeamForm}">
                        <div class="mb-3">
                            <label for="name" class="form-label fw-semibold" th:text="#{team.form.name}">Team Name</label>
                            <input type="text" id="name" th:field="*{name}"
                                   class="form-control" th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'"
                                   th:placeholder="#{team.form.name}" autofocus>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}"
                                 th:errors="*{name}"></div>
                        </div>
                        <div class="alert alert-info">
                            <i class="bi bi-info-circle me-1"></i>
                            <span th:text="#{team.create.info}">An invite code will be automatically generated.</span>
                        </div>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-wc">
                                <i class="bi bi-check-circle me-1"></i>
                                <span th:text="#{team.create.button}">Create Team</span>
                            </button>
                            <a th:href="@{/teams}" class="btn btn-outline-secondary" th:text="#{form.cancel}">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
