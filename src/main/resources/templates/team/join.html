<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(#{team.join.title})}"></head>
<body class="app-body">

<div th:replace="~{fragments/layout :: sidebar}"></div>

<div class="page-wrapper">
<main class="main-container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-wc text-white py-3">
                    <h4 class="mb-0">
                        <i class="bi bi-door-open me-2"></i>
                        <span th:text="#{team.join.title}">Join a Team</span>
                    </h4>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/teams/join}" method="post" th:object="${joinTeamForm}">
                        <div class="mb-4">
                            <label for="inviteCode" class="form-label fw-semibold" th:text="#{team.form.invitecode}">Invite Code</label>
                            <input type="text" id="inviteCode" th:field="*{inviteCode}"
                                   class="form-control form-control-lg text-uppercase"
                                   th:classappend="${#fields.hasErrors('inviteCode')} ? 'is-invalid'"
                                   placeholder="XXXXXXXX" autofocus
                                   style="letter-spacing: 0.2em;">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('inviteCode')}"
                                 th:errors="*{inviteCode}"></div>
                            <div class="form-text" th:text="#{team.join.hint}">Ask the team owner for their invite code.</div>
                        </div>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-wc">
                                <i class="bi bi-check-circle me-1"></i>
                                <span th:text="#{team.join.button}">Join Team</span>
                            </button>
                            <a th:href="@{/teams}" class="btn btn-outline-secondary" th:text="#{form.cancel}">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
