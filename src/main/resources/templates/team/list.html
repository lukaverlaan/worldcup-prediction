<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(#{team.page.title})}"></head>
<body class="app-body">

<div th:replace="~{fragments/layout :: sidebar}"></div>

<div class="page-wrapper">
<main class="main-container">

    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show">
        <span th:text="#{${successMessage}}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show">
        <span th:text="#{${errorMessage}}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
        <h2 class="mb-0"><i class="bi bi-people me-2"></i><span th:text="#{team.page.title}">My Teams</span></h2>
        <div class="d-flex gap-2 flex-wrap">
            <a th:href="@{/teams/create}" class="btn btn-wc">
                <i class="bi bi-plus-circle me-1"></i><span th:text="#{team.create.button}">Create Team</span>
            </a>
            <a th:href="@{/teams/join}" class="btn btn-outline-secondary">
                <i class="bi bi-door-open me-1"></i><span th:text="#{team.join.button}">Join Team</span>
            </a>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(teams)}" class="text-center py-5">
        <i class="bi bi-people display-1 text-muted"></i>
        <p class="mt-3 text-muted" th:text="#{team.empty.message}">You are not a member of any team yet.</p>
    </div>

    <div class="row g-3" th:unless="${#lists.isEmpty(teams)}">
        <div class="col-md-6 col-lg-4" th:each="team : ${teams}">
            <div class="card h-100">
                <div class="card-header bg-wc text-white">
                    <h5 class="mb-0" th:text="${team.name}">Team Name</h5>
                </div>
                <div class="card-body">
                    <p class="text-muted mb-1">
                        <i class="bi bi-person-fill me-1"></i>
                        <span th:text="#{team.owner}">Owner:</span>
                        <span th:text="${team.owner.username}">owner</span>
                    </p>
                    <p class="text-muted mb-1">
                        <i class="bi bi-people-fill me-1"></i>
                        <span th:text="#{team.members.count}">Members:</span>
                        <span th:text="${team.members.size()}">0</span>
                    </p>
                </div>
                <div class="card-footer">
                    <a th:href="@{/teams/{id}(id=${team.id})}" class="btn btn-sm btn-wc">
                        <i class="bi bi-eye me-1"></i><span th:text="#{team.view.button}">View Team</span>
                    </a>
                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
