<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head(#{home.tab.upcoming})}"></head>
<body class="app-body">

<div th:replace="~{fragments/layout :: sidebar}"></div>

<div class="page-wrapper">
<main class="main-container">

    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
        <ul class="nav nav-pills gap-2">
            <li class="nav-item">
                <a class="nav-link" th:classappend="${tab == 'upcoming'} ? 'active'"
                   th:href="@{/matches(tab='upcoming')}">
                    <i class="bi bi-calendar-event me-1"></i>
                    <span th:text="#{home.tab.upcoming}">Komende wedstrijden</span>
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" th:classappend="${tab == 'past'} ? 'active'"
                   th:href="@{/matches(tab='past')}">
                    <i class="bi bi-clock-history me-1"></i>
                    <span th:text="#{home.tab.past}">Gespeeld</span>
                </a>
            </li>
        </ul>
        <a sec:authorize="hasRole('ADMIN')" th:href="@{/admin/matches}" class="btn btn-sm btn-outline-danger">
            <i class="bi bi-gear me-1"></i><span th:text="#{home.admin.manage}">Wedstrijden beheren</span>
        </a>
    </div>

    <div th:if="${#lists.isEmpty(matches)}" class="alert alert-info">
        <span th:text="${tab == 'past'} ? #{home.matches.past.empty} : #{home.matches.empty}">Geen wedstrijden.</span>
    </div>

    <!-- Landfilter picker -->
    <div th:unless="${#lists.isEmpty(matches)}" class="mb-3">
        <div class="country-picker" id="filterPicker" style="max-width:280px">
            <div class="picker-trigger" id="filterPicker-trigger" tabindex="0">
                <img class="picker-trigger-logo" id="filterPicker-logo" src="" alt="" style="display:none">
                <span class="picker-trigger-placeholder" id="filterPicker-placeholder">
                    <i class="bi bi-funnel me-1"></i>Filter op land…
                </span>
                <span class="picker-trigger-name" id="filterPicker-name" style="display:none"></span>
                <i class="bi bi-chevron-down picker-trigger-chevron" id="filterPicker-chevron"></i>
            </div>
            <div class="picker-dropdown" id="filterPicker-dropdown">
                <div class="picker-search-wrap">
                    <input type="text" class="form-control picker-search-input"
                           id="filterPicker-search" placeholder="🔍 Type to filter…" autocomplete="off">
                </div>
                <div class="picker-list" id="filterPicker-list"></div>
            </div>
        </div>
        <div id="filterNoResults" class="alert alert-info mt-2" style="display:none">Geen wedstrijden gevonden voor dit land.</div>
    </div>

    <div th:unless="${#lists.isEmpty(matches) and selectedCountry == null}" class="home-dash-card p-0">
        <div class="match-list-table match-list-table--rounded">
            <div th:each="match, iter : ${matches}"
                 class="match-list-row clickable-row"
                 th:data-href="@{/matches/{id}(id=${match.id},from='matches')}"
                 th:data-kickoff="${#temporals.format(match.dateTime, 'yyyy-MM-dd''T''HH:mm')}"
                 th:data-match-id="${match.live} ? ${match.id} : null"
                 th:data-team-a="${match.teamA}"
                 th:data-team-b="${match.teamB}">

                <!-- Rang -->
                <div class="match-list-num text-muted" th:text="${iter.index + 1 + currentPage * 15}"></div>

                <!-- Body: teams + info -->
                <div class="match-list-body">
                    <div class="match-list-teams">
                        <div class="match-list-team" th:with="infoA=${@countryRegistry.get(match.teamA)}">
                            <img th:if="${infoA != null}" th:src="${infoA.logoUrl()}" height="22" class="country-logo" alt="">
                            <span th:text="${@countryRegistry.getDisplayName(match.teamA, #locale)}">Team A</span>
                        </div>
                        <div class="match-list-vs" th:if="${match.hasResult()}">
                            <span th:text="${match.officialScoreA}">0</span>
                            <span style="color:#555">–</span>
                            <span th:text="${match.officialScoreB}">0</span>
                            <span th:if="${match.penaltyWinner != null}"
                                  class="badge bg-info text-dark ms-1" style="font-size:.65rem;vertical-align:middle"
                                  th:text="'pen.'"></span>
                        </div>
                        <div class="match-list-vs fw-bold text-danger" th:if="${match.live and !match.hasResult()}"
                             th:text="${match.liveScoreA != null} ? (${match.liveScoreA} + ' – ' + ${match.liveScoreB}) : '0 – 0'">0–0</div>
                        <div class="match-list-vs text-muted" th:if="${match.pendingStart}" th:text="'0 – 0'">0–0</div>
                        <div class="match-list-vs" th:unless="${match.hasResult() or match.live or match.pendingStart}">vs</div>
                        <div class="match-list-team" th:with="infoB=${@countryRegistry.get(match.teamB)}">
                            <img th:if="${infoB != null}" th:src="${infoB.logoUrl()}" height="22" class="country-logo" alt="">
                            <span th:text="${@countryRegistry.getDisplayName(match.teamB, #locale)}">Team B</span>
                        </div>
                    </div>
                    <div class="match-list-info">
                        <span style="color:#ccc" th:text="${#temporals.format(match.dateTime, #messages.msg('date.format'))}"></span>
                        <span th:unless="${match.live or match.hasResult()}" class="starts-in-label badge bg-warning text-dark ms-1" style="display:none"></span>
                        <span th:if="${match.stadium != null}" class="match-list-stadium">
                            <i class="bi bi-geo-alt me-1"></i><span th:text="${match.stadium}"></span>
                        </span>
                    </div>
                </div>

                <!-- Ronde badge / LIVE badge / prognose-indicator -->
                <div class="match-list-round">
                    <span th:if="${match.live}" class="badge bg-danger me-1">
                        <i class="bi bi-circle-fill me-1" style="font-size:.5rem;vertical-align:middle"></i>LIVE
                    </span>
                    <span th:if="${match.pendingStart}" class="badge bg-secondary me-1" th:text="#{match.pending.start}"></span>
                    <span th:if="${match.round != null}" class="badge bg-secondary badge-round" th:text="${@roundLabels.translate(match.round)}"></span>
                    <span th:if="${userPredictions != null}"
                          th:with="pred=${userPredictions[match.id]}, closed=${match.dateTime.minusHours(1).isBefore(T(java.time.LocalDateTime).now())}">
                        <span th:if="${pred != null}" class="pred-indicator text-success" title="Prognose ingediend">
                            <i class="bi bi-check-circle-fill"></i>
                        </span>
                        <span th:if="${pred == null and !closed and !match.hasResult()}" class="pred-indicator text-warning" title="Nog geen prognose">
                            <i class="bi bi-pencil-fill"></i>
                        </span>
                        <span th:if="${pred == null and closed and !match.hasResult()}" class="pred-indicator text-secondary" title="Gesloten zonder prognose">
                            <i class="bi bi-lock-fill"></i>
                        </span>
                    </span>
                </div>

                <!-- Chevron -->
                <div class="match-list-chevron text-muted">
                    <i class="bi bi-chevron-right"></i>
                </div>
            </div>
        </div>
    </div>

    <!-- Pagination -->
    <nav th:if="${totalPages > 1}" aria-label="Match pages" class="d-flex justify-content-center mt-4">
        <ul class="pagination pagination-sm mb-0">
            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                <a class="page-link" th:href="@{/matches(page=${currentPage - 1}, tab=${tab})}">
                    <i class="bi bi-chevron-left"></i>
                </a>
            </li>
            <li th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                class="page-item" th:classappend="${i == currentPage} ? 'active'">
                <a class="page-link" th:href="@{/matches(page=${i}, tab=${tab})}" th:text="${i + 1}">1</a>
            </li>
            <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                <a class="page-link" th:href="@{/matches(page=${currentPage + 1}, tab=${tab})}">
                    <i class="bi bi-chevron-right"></i>
                </a>
            </li>
        </ul>
    </nav>

</main>
<footer th:replace="~{fragments/layout :: footer}"></footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
    // ── Landfilter picker ──
    const WC_COUNTRIES_RAW = /*[[${countries}]]*/ [];
    const LOCALE = /*[[${#locale.language}]]*/ 'en';
    const SELECTED_COUNTRY = /*[[${selectedCountry}]]*/ null;
    const CURRENT_TAB = /*[[${tab}]]*/ 'upcoming';

    const WC_COUNTRIES = WC_COUNTRIES_RAW
        .map(c => ({ ...c, display: LOCALE === 'nl' && c.nameNl ? c.nameNl : c.name }))
        .sort((a, b) => a.display.localeCompare(b.display));

    (function () {
        const trigger   = document.getElementById('filterPicker-trigger');
        const dropdown  = document.getElementById('filterPicker-dropdown');
        const search    = document.getElementById('filterPicker-search');
        const list      = document.getElementById('filterPicker-list');
        const logo      = document.getElementById('filterPicker-logo');
        const nameEl    = document.getElementById('filterPicker-name');
        const phEl      = document.getElementById('filterPicker-placeholder');
        const chevron   = document.getElementById('filterPicker-chevron');
        if (!trigger) return;

        let activeCode = SELECTED_COUNTRY;

        function renderList(filter) {
            const q = (filter || '').toLowerCase();
            const items = WC_COUNTRIES.filter(c => c.display.toLowerCase().includes(q) || c.name.toLowerCase().includes(q));
            list.innerHTML = '';
            items.forEach(c => {
                const div = document.createElement('div');
                div.className = 'picker-option' + (activeCode === c.name ? ' selected' : '');
                const img = c.logoUrl
                    ? `<img class="picker-option-logo" src="${c.logoUrl}" alt="" loading="lazy">`
                    : `<div class="picker-option-logo-placeholder"><i class="bi bi-shield"></i></div>`;
                div.innerHTML = `${img}<span class="picker-option-name">${c.display}</span>`;
                div.addEventListener('mousedown', e => { e.preventDefault(); selectCountry(c); });
                list.appendChild(div);
            });
        }

        function showSelected(c) {
            nameEl.textContent = c.display;
            if (c.logoUrl) { logo.src = c.logoUrl; logo.style.display = ''; }
            else logo.style.display = 'none';
            phEl.style.display = 'none';
            nameEl.style.display = '';
            chevron.className = 'bi bi-x picker-trigger-chevron';
        }

        function selectCountry(c) {
            closeDropdown();
            window.location.href = '/matches?tab=' + CURRENT_TAB + '&country=' + encodeURIComponent(c.name);
        }

        function clearFilter() {
            window.location.href = '/matches?tab=' + CURRENT_TAB;
        }

        function openDropdown() {
            trigger.classList.add('open');
            dropdown.classList.add('open');
            search.value = '';
            renderList('');
            search.focus();
        }

        function closeDropdown() {
            trigger.classList.remove('open');
            dropdown.classList.remove('open');
        }

        // Pre-selecteer als er al een land in de URL zit
        if (activeCode) {
            const existing = WC_COUNTRIES.find(c => c.name === activeCode);
            if (existing) showSelected(existing);
        }

        trigger.addEventListener('click', () => {
            if (activeCode) { clearFilter(); return; }
            dropdown.classList.contains('open') ? closeDropdown() : openDropdown();
        });
        trigger.addEventListener('keydown', e => {
            if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); if (!activeCode) openDropdown(); else clearFilter(); }
        });
        search.addEventListener('input', () => renderList(search.value));
        document.addEventListener('mousedown', e => {
            if (!document.getElementById('filterPicker').contains(e.target)) closeDropdown();
        });
    })();

    var startsInTpl = [[#{match.starts.in}]];
    var startsImminent = [[#{match.imminent}]];

    function updateKickoffLabels() {
        var now = new Date();
        document.querySelectorAll('.match-list-row[data-kickoff]').forEach(function(row) {
            var label = row.querySelector('.starts-in-label');
            if (!label) return;
            var kickoff = new Date(row.dataset.kickoff);
            var diffMs = kickoff - now;
            var diffMin = Math.ceil(diffMs / 60000);
            if (diffMin >= 1 && diffMin < 60) {
                label.textContent = startsInTpl.replace('{0}', diffMin);
                label.style.display = '';
            } else if (diffMin === 0) {
                label.textContent = startsImminent;
                label.style.display = '';
            } else {
                label.style.display = 'none';
            }
        });
    }

    document.querySelectorAll('.clickable-row').forEach(function(row) {
        row.addEventListener('click', function() {
            var href = this.dataset.href;
            if (href) window.location.href = href;
        });
    });

    updateKickoffLabels();
    setInterval(updateKickoffLabels, 60000);

    // Live rijen auto-refresh + detectie van nieuwe live matches
    function refreshLiveRows() {
        var now = new Date();
        document.querySelectorAll('.match-list-row[data-kickoff]').forEach(function(row) {
            var matchId = row.dataset.matchId;
            var kickoff = new Date(row.dataset.kickoff);
            // Alleen checken als aftrap voorbij is en nog geen officieel resultaat
            if (kickoff > now) return;
            if (!matchId || matchId === 'null') {
                // Was nog niet live — check of dat veranderd is
                var id = row.dataset.href && row.dataset.href.match(/\/matches\/(\d+)/);
                if (!id) return;
                fetch('/api/matches/' + id[1] + '/live')
                    .then(function(r) { return r.json(); })
                    .then(function(data) {
                        if (data.isLive || data.hasResult) window.location.reload();
                    }).catch(function() {});
                return;
            }
            fetch('/api/matches/' + matchId + '/live')
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    if (data.hasResult) { window.location.reload(); return; }
                    if (data.isLive) {
                        var vsEl = row.querySelector('.match-list-vs');
                        var badge = row.querySelector('.badge.bg-danger');
                        if (vsEl && data.liveScoreA !== null && data.liveScoreB !== null)
                            vsEl.textContent = data.liveScoreA + ' – ' + data.liveScoreB;
                    }
                }).catch(function() {});
        });
    }

    setInterval(refreshLiveRows, 30000);
</script>
</body>
</html>
