<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(#{admin.matches.title})}"></head>
<body class="app-body">

<div th:replace="~{fragments/layout :: sidebar}"></div>

<div class="page-wrapper">
<main class="main-container">

    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show">
        <span th:text="#{${successMessage}}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="bi bi-gear me-2"></i><span th:text="#{admin.matches.title}">Match Management</span></h2>
        <div class="d-flex gap-2">
            <a th:href="@{/admin/matches/new}" class="btn btn-wc">
                <i class="bi bi-plus-circle me-1"></i><span th:text="#{admin.match.add}">Add Match</span>
            </a>
            <form th:action="@{/admin/resync-times}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="btn btn-outline-secondary">
                    <i class="bi bi-clock-history me-1"></i>Tijden hersynen
                </button>
            </form>
            <form th:action="@{/admin/recalculate-all}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="btn btn-outline-warning">
                    <i class="bi bi-arrow-repeat me-1"></i>Scores herberekenen
                </button>
            </form>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(matches)}" class="alert alert-info" th:text="#{admin.matches.empty}">
        No matches yet.
    </div>

    <div th:unless="${#lists.isEmpty(matches)}" class="table-responsive">
        <table class="table table-hover align-middle">
            <thead class="table-dark">
                <tr>
                    <th th:text="#{admin.table.match}">Match</th>
                    <th th:text="#{admin.table.datetime}">Date &amp; Time</th>
                    <th th:text="#{admin.table.location}">Location</th>
                    <th th:text="#{admin.table.stadiumcode}">Stadium Code</th>
                    <th th:text="#{admin.table.result}">Result</th>
                    <th th:text="#{admin.table.actions}">Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="match : ${matches}">
                    <td class="fw-semibold">
                        <th:block th:with="infoA=${@countryRegistry.get(match.teamA)}">
                            <img th:if="${infoA != null}" th:src="${infoA.logoUrl()}"
                                 height="22" class="country-logo me-1" alt="">
                            <span th:text="${@countryRegistry.getDisplayName(match.teamA, #locale)}">A</span>
                        </th:block>
                        <span class="text-muted mx-1" th:text="#{match.vs}">vs</span>
                        <th:block th:with="infoB=${@countryRegistry.get(match.teamB)}">
                            <img th:if="${infoB != null}" th:src="${infoB.logoUrl()}"
                                 height="22" class="country-logo me-1" alt="">
                            <span th:text="${@countryRegistry.getDisplayName(match.teamB, #locale)}">B</span>
                        </th:block>
                    </td>
                    <td th:text="${#temporals.format(match.dateTime, #messages.msg('date.format'))}">Date</td>
                    <td th:text="${match.city} + (${match.stadium} != null ? ' – ' + ${match.stadium} : '')">Location</td>
                    <td>
                        <code th:if="${match.stadiumCode != null}" th:text="${match.stadiumCode}">0000</code>
                        <span th:unless="${match.stadiumCode != null}" class="text-muted">—</span>
                    </td>
                    <td>
                        <span th:if="${match.hasResult()}" class="badge bg-success"
                              th:text="${match.officialScoreA} + '–' + ${match.officialScoreB}">3-1</span>
                        <span th:unless="${match.hasResult()}" class="badge bg-secondary" th:text="#{admin.status.pending}">Pending</span>
                    </td>
                    <td>
                        <a th:href="@{/admin/matches/{id}/edit(id=${match.id})}"
                           class="btn btn-sm btn-outline-warning me-1" th:title="#{match.edit}">
                            <i class="bi bi-pencil"></i>
                        </a>
                        <a th:href="@{/admin/matches/{id}/result(id=${match.id})}"
                           class="btn btn-sm btn-outline-success me-1" th:title="#{match.enter.result}">
                            <i class="bi bi-check2-square"></i>
                        </a>
                        <form th:action="@{/admin/matches/{id}/delete(id=${match.id})}" method="post"
                              class="d-inline">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button type="submit" class="btn btn-sm btn-outline-danger"
                                    th:title="#{admin.match.delete}"
                                    th:attr="data-confirm=#{admin.match.delete.confirm}"
                                    onclick="return confirm(this.dataset.confirm)">
                                <i class="bi bi-trash"></i>
                            </button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Pagination -->
    <nav th:if="${totalPages > 1}" aria-label="Match pages" class="d-flex justify-content-center mt-3">
        <ul class="pagination pagination-sm mb-0">
            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                <a class="page-link" th:href="@{/admin/matches(page=${currentPage - 1})}">
                    <i class="bi bi-chevron-left"></i>
                </a>
            </li>
            <li th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                class="page-item" th:classappend="${i == currentPage} ? 'active'">
                <a class="page-link" th:href="@{/admin/matches(page=${i})}" th:text="${i + 1}">1</a>
            </li>
            <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                <a class="page-link" th:href="@{/admin/matches(page=${currentPage + 1})}">
                    <i class="bi bi-chevron-right"></i>
                </a>
            </li>
        </ul>
    </nav>

</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
