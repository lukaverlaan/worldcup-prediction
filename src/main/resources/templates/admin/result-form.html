<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(#{admin.result.title})}"></head>
<body class="app-body">

<div th:replace="~{fragments/layout :: sidebar}"></div>

<div class="page-wrapper">
<main class="main-container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-success text-white py-3">
                    <h4 class="mb-0">
                        <i class="bi bi-check2-square me-2"></i>
                        <span th:text="#{admin.result.title}">Enter Official Result</span>
                    </h4>
                </div>
                <div class="card-body p-4">
                    <div class="text-center mb-4">
                        <span class="h5 fw-bold" th:text="${match.teamA}">Team A</span>
                        <span class="mx-3 text-muted" th:text="#{match.vs}">vs</span>
                        <span class="h5 fw-bold" th:text="${match.teamB}">Team B</span>
                        <br>
                        <small class="text-muted"
                               th:text="${#temporals.format(match.dateTime, #messages.msg('date.format'))}">Date</small>
                    </div>

                    <form th:action="@{/admin/matches/{id}/result(id=${match.id})}"
                          method="post" th:object="${resultForm}">
                        <div class="row g-3 align-items-end mb-4">
                            <div class="col-5">
                                <label class="form-label fw-semibold" th:text="${match.teamA}">Team A</label>
                                <input type="number" th:field="*{officialScoreA}" min="0"
                                       class="form-control form-control-lg text-center"
                                       th:classappend="${#fields.hasErrors('officialScoreA')} ? 'is-invalid'"
                                       placeholder="0">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('officialScoreA')}"
                                     th:errors="*{officialScoreA}"></div>
                            </div>
                            <div class="col-2 text-center pb-2">
                                <span class="h4 fw-bold text-muted">–</span>
                            </div>
                            <div class="col-5">
                                <label class="form-label fw-semibold" th:text="${match.teamB}">Team B</label>
                                <input type="number" th:field="*{officialScoreB}" min="0"
                                       class="form-control form-control-lg text-center"
                                       th:classappend="${#fields.hasErrors('officialScoreB')} ? 'is-invalid'"
                                       placeholder="0">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('officialScoreB')}"
                                     th:errors="*{officialScoreB}"></div>
                            </div>
                        </div>

                        <div class="alert alert-warning py-2">
                            <i class="bi bi-exclamation-triangle me-1"></i>
                            <small th:text="#{admin.result.warning}">Saving the result will automatically calculate points.</small>
                        </div>

                        <div class="d-flex gap-2 mt-3">
                            <button type="submit" class="btn btn-success">
                                <i class="bi bi-check-circle me-1"></i>
                                <span th:text="#{admin.result.submit}">Save Result &amp; Calculate Points</span>
                            </button>
                            <a th:href="@{/admin/matches}" class="btn btn-outline-secondary" th:text="#{form.cancel}">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
