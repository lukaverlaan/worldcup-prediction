<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(#{admin.teams.title})}"></head>
<body class="app-body">

<div th:replace="~{fragments/layout :: sidebar}"></div>

<div class="page-wrapper">
<main class="main-container">

    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show">
        <span th:text="#{${successMessage}}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="bi bi-people-fill me-2"></i><span th:text="#{admin.teams.title}">Team Management</span></h2>
    </div>

    <div th:if="${#lists.isEmpty(teams)}" class="alert alert-info" th:text="#{admin.teams.empty}">
        No teams yet.
    </div>

    <div th:unless="${#lists.isEmpty(teams)}" class="table-responsive">
        <table class="table table-hover align-middle">
            <thead class="table-dark">
                <tr>
                    <th>#</th>
                    <th th:text="#{scoreboard.team}">Team</th>
                    <th th:text="#{team.owner}">Owner</th>
                    <th class="text-center" th:text="#{team.members.count}">Members</th>
                    <th class="text-center" th:text="#{scoreboard.points}">Points</th>
                    <th th:text="#{admin.table.actions}">Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="entry, iter : ${teams}">
                    <td class="text-muted fw-semibold" th:text="${iter.index + 1}">1</td>
                    <td>
                        <i class="bi bi-people me-1 text-wc"></i>
                        <strong th:text="${entry.team.name}">Team</strong>
                    </td>
                    <td>
                        <i class="bi bi-person-circle me-1"></i>
                        <span th:text="${entry.team.owner.username}">owner</span>
                    </td>
                    <td class="text-center" th:text="${entry.memberCount}">0</td>
                    <td class="text-center fw-bold">
                        <span class="badge bg-wc">
                            <span th:text="${#numbers.formatDecimal(entry.avgScore, 1, 0)}">0</span>
                            <span th:text="#{pts}">pts</span>
                        </span>
                    </td>
                    <td>
                        <div class="d-flex gap-1">
                            <a th:href="@{/teams/{id}(id=${entry.team.id})}"
                               class="btn btn-sm btn-outline-secondary">
                                <i class="bi bi-eye me-1"></i><span th:text="#{team.view.button}">View</span>
                            </a>
                            <form th:action="@{/admin/teams/{id}/delete(id=${entry.team.id})}" method="post"
                                  th:attr="data-confirm=#{admin.team.delete.confirm}"
                                  onclick="return confirm(this.dataset.confirm)">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <button type="submit" class="btn btn-sm btn-outline-danger">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </form>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
