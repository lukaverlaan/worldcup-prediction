<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">FIFA World Cup 2026</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
</head>

<!-- ── Sidebar fragment ─────────────────────────────────────── -->
<div th:fragment="sidebar"
     xmlns:th="http://www.thymeleaf.org"
     xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

    <!-- Mobile top bar (visible < lg) -->
    <header class="mobile-header">
        <a th:href="@{/}">
            <img th:src="@{/images/wc2026-logo.png}" class="mobile-logo-img" alt="FIFA World Cup 2026">
            <span>FIFA WC 2026</span>
        </a>
        <button class="sidebar-toggle-btn" id="sidebarToggle" type="button" aria-label="Toggle menu">
            <i class="bi bi-list"></i>
        </button>
    </header>

    <!-- Overlay backdrop (mobile) -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Sidebar panel -->
    <aside class="sidebar" id="appSidebar">

        <!-- Logo -->
        <div class="sidebar-logo">
            <a th:href="@{/}">
                <img th:src="@{/images/wc2026-logo.png}" class="sidebar-logo-img" alt="FIFA World Cup 2026">
            </a>
        </div>

        <!-- Navigation links -->
        <nav class="sidebar-nav">
            <ul>
                <li>
                    <a th:href="@{/}" class="sidebar-link">
                        <i class="bi bi-house"></i>
                        <span th:text="#{nav.home}">Home</span>
                    </a>
                </li>
                <li>
                    <a th:href="@{/groups}" class="sidebar-link">
                        <i class="bi bi-grid-3x3-gap-fill"></i>
                        <span th:text="#{nav.groups}">Groepsfase</span>
                    </a>
                </li>
                <li>
                    <a th:href="@{/bracket}" class="sidebar-link">
                        <i class="bi bi-diagram-3"></i>
                        <span th:text="#{nav.bracket}">Bracket</span>
                    </a>
                </li>
                <li>
                    <a th:href="@{/scoreboard}" class="sidebar-link">
                        <i class="bi bi-trophy"></i>
                        <span th:text="#{nav.scoreboard}">Scoreboard</span>
                    </a>
                </li>
                <li sec:authorize="isAuthenticated()">
                    <a th:href="@{/my-predictions}" class="sidebar-link">
                        <i class="bi bi-card-checklist"></i>
                        <span th:text="#{mypred.title}">Mijn Prognoses</span>
                    </a>
                </li>
                <li sec:authorize="isAuthenticated()">
                    <a th:href="@{/teams}" class="sidebar-link">
                        <i class="bi bi-people"></i>
                        <span th:text="#{nav.myteams}">My Teams</span>
                    </a>
                </li>
                <li sec:authorize="hasRole('ADMIN')">
                    <a th:href="@{/admin/matches}" class="sidebar-link">
                        <i class="bi bi-gear"></i>
                        <span th:text="#{nav.admin.matches}">Manage Matches</span>
                    </a>
                </li>
                <li sec:authorize="hasRole('ADMIN')">
                    <a th:href="@{/admin/teams}" class="sidebar-link">
                        <i class="bi bi-people-fill"></i>
                        <span th:text="#{nav.admin.teams}">Manage Teams</span>
                    </a>
                </li>
            </ul>
        </nav>

        <!-- Authenticated: user profile + logout -->
        <div class="sidebar-footer" sec:authorize="isAuthenticated()">
            <div class="sidebar-user">
                <div class="user-avatar avatar-admin" sec:authorize="hasRole('ADMIN')">
                    <i class="bi bi-person-fill"></i>
                </div>
                <div class="user-avatar avatar-user" sec:authorize="!hasRole('ADMIN')">
                    <i class="bi bi-person-fill"></i>
                </div>
                <div class="user-info">
                    <span class="user-name" th:text="${#authentication.name}" th:title="${#authentication.name}">gebruiker</span>
                    <span class="user-role-badge" sec:authorize="hasRole('ADMIN')" th:text="#{role.admin}">Admin</span>
                    <span class="user-role-badge" sec:authorize="!hasRole('ADMIN')" th:text="#{role.user}">User</span>
                </div>
            </div>
            <div class="sidebar-bottom-actions">
                <div class="d-flex gap-1">
                    <button type="button"
                            th:class="${#locale.language == 'en'} ? 'lang-btn active' : 'lang-btn'"
                            onclick="switchLang('en')">EN</button>
                    <button type="button"
                            th:class="${#locale.language == 'nl'} ? 'lang-btn active' : 'lang-btn'"
                            onclick="switchLang('nl')">NL</button>
                    <button type="button"
                            th:class="${#locale.language == 'fr'} ? 'lang-btn active' : 'lang-btn'"
                            onclick="switchLang('fr')">FR</button>
                </div>
                <form th:action="@{/logout}" method="post" class="ms-auto">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit" class="sidebar-logout" th:title="#{nav.logout}">
                        <i class="bi bi-box-arrow-right"></i>
                    </button>
                </form>
            </div>
        </div>

        <!-- Anonymous: login / register links + lang -->
        <div class="sidebar-footer" sec:authorize="isAnonymous()">
            <ul style="list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:2px">
                <li>
                    <a th:href="@{/login}" class="sidebar-link">
                        <i class="bi bi-box-arrow-in-right"></i>
                        <span th:text="#{nav.login}">Login</span>
                    </a>
                </li>
                <li>
                    <a th:href="@{/register}" class="sidebar-link">
                        <i class="bi bi-person-plus"></i>
                        <span th:text="#{nav.register}">Register</span>
                    </a>
                </li>
            </ul>
            <div class="d-flex gap-1 mt-2 px-1">
                <button type="button"
                        th:class="${#locale.language == 'en'} ? 'lang-btn active' : 'lang-btn'"
                        onclick="switchLang('en')">EN</button>
                <button type="button"
                        th:class="${#locale.language == 'nl'} ? 'lang-btn active' : 'lang-btn'"
                        onclick="switchLang('nl')">NL</button>
                <button type="button"
                        th:class="${#locale.language == 'fr'} ? 'lang-btn active' : 'lang-btn'"
                        onclick="switchLang('fr')">FR</button>
            </div>
        </div>

    </aside>

    <script>
        // Language switcher
        function switchLang(lang) {
            var url = new URL(window.location.href);
            url.searchParams.set('lang', lang);
            window.location.href = url.toString();
        }

        // Mobile toggle
        (function () {
            var toggle = document.getElementById('sidebarToggle');
            var sidebar = document.getElementById('appSidebar');
            var overlay = document.getElementById('sidebarOverlay');
            if (!toggle) return;
            toggle.addEventListener('click', function () {
                sidebar.classList.toggle('open');
                overlay.classList.toggle('show');
            });
            overlay.addEventListener('click', function () {
                sidebar.classList.remove('open');
                overlay.classList.remove('show');
            });
        })();

        // Active nav link highlight
        (function () {
            var path = window.location.pathname;
            document.querySelectorAll('.sidebar-link').forEach(function (link) {
                var href = link.getAttribute('href');
                if (!href) return;
                var active = href === '/'
                    ? path === '/'
                    : (path === href || path.startsWith(href + '/'));
                if (active) link.classList.add('active');
            });
        })();
    </script>
</div>

<!-- ── Footer fragment ──────────────────────────────────────── -->
<footer th:fragment="footer" class="footer">
    <div class="container text-center">
        <span>FIFA World Cup 2026 &copy; Team Prediction App</span>
    </div>
</footer>

</html>
