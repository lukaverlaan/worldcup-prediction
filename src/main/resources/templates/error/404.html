<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(#{error.404.title})}"></head>
<body class="app-body">

<div th:replace="~{fragments/layout :: sidebar}"></div>

<div class="page-wrapper">
<main class="main-container text-center">
    <div class="row justify-content-center">
        <div class="col-md-6 py-5">
            <div class="display-1 fw-bold text-wc">404</div>
            <i class="bi bi-search display-3 text-muted"></i>
            <h2 class="mt-3" th:text="#{error.404.title}">Page Not Found</h2>
            <p class="text-muted" th:text="#{error.404.message}">The page you are looking for does not exist.</p>
            <a th:href="@{/}" class="btn btn-wc mt-3">
                <i class="bi bi-house me-1"></i><span th:text="#{nav.home}">Home</span>
            </a>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
