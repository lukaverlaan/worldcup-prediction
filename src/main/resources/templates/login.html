<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Login')}"></head>
<body>

<div class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <i class="bi bi-trophy-fill" style="color: var(--wc-red); font-size: 2rem;"></i>
            <h1 th:text="#{login.title}">Welcome back</h1>
            <p th:text="#{login.subtitle}">Sign in to your account</p>
        </div>

        <div th:if="${param.error}" class="alert alert-danger py-2 mb-3">
            <i class="bi bi-exclamation-triangle me-1"></i>
            <span th:text="#{login.error}">Invalid username or password.</span>
        </div>
        <div th:if="${param.logout}" class="alert alert-info py-2 mb-3">
            <i class="bi bi-check-circle me-1"></i>
            <span th:text="#{login.logout}">You have been logged out.</span>
        </div>
        <div th:if="${param.registered}" class="alert alert-success py-2 mb-3">
            <i class="bi bi-check-circle me-1"></i>
            <span th:text="#{login.registered}">Registration successful!</span>
        </div>

        <form th:action="@{/login}" method="post" class="d-flex flex-column gap-3">
            <div>
                <label for="username" class="form-label fw-semibold" th:text="#{form.username}">Username</label>
                <input type="text" id="username" name="username" class="form-control"
                       th:placeholder="#{form.username}" required autofocus>
            </div>
            <div>
                <label for="password" class="form-label fw-semibold" th:text="#{form.password}">Password</label>
                <input type="password" id="password" name="password" class="form-control"
                       placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-wc w-100 mt-2 py-2">
                <i class="bi bi-box-arrow-in-right me-1"></i>
                <span th:text="#{login.submit}">Sign in</span>
            </button>
        </form>

        <p class="auth-footer-note">
            <span th:text="#{login.no.account}">Don't have an account?</span>
            <a th:href="@{/register}" th:text="#{login.register.link}">Register here</a>
        </p>

        <div class="auth-lang">
            <button type="button"
                    th:class="${#locale.language == 'en'} ? 'lang-btn active' : 'lang-btn'"
                    onclick="switchLang('en')">EN</button>
            <button type="button"
                    th:class="${#locale.language == 'nl'} ? 'lang-btn active' : 'lang-btn'"
                    onclick="switchLang('nl')">NL</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function switchLang(lang) {
        var url = new URL(window.location.href);
        url.searchParams.set('lang', lang);
        window.location.href = url.toString();
    }
</script>
</body>
</html>
