<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head(#{profile.title})}"></head>
<body class="app-body">

<div th:replace="~{fragments/layout :: sidebar}"></div>

<div class="page-wrapper">
<main class="main-container" style="max-width:600px">

    <h2 class="mb-4"><i class="bi bi-person-circle me-2 text-wc"></i><span th:text="#{profile.title}">Mijn Profiel</span></h2>

    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show">
        <span th:text="#{${successMessage}}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${pictureError}" class="alert alert-danger alert-dismissible fade show">
        <span th:text="#{${pictureError}}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Verborgen upload form (wordt programmatisch gesubmit na crop) -->
    <form id="uploadForm" th:action="@{/profile/picture}" method="post" enctype="multipart/form-data" style="display:none">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <input type="file" id="hiddenFileInput" name="picture">
    </form>

    <!-- Profielfoto kaart -->
    <div class="card shadow-sm mb-4">
        <div class="card-header fw-semibold">
            <i class="bi bi-camera me-1"></i><span th:text="#{profile.picture.title}">Profielfoto</span>
        </div>
        <div class="card-body d-flex align-items-center gap-4 flex-wrap">
            <img th:src="@{/profile/picture/{u}(u=${user.username},v=${pictureVersion})}"
                 alt="profielfoto" id="avatarPreview"
                 style="width:80px;height:80px;border-radius:50%;object-fit:cover;border:3px solid var(--wc-green);">
            <div class="d-flex flex-column gap-2">
                <label class="btn btn-outline-secondary mb-0" style="cursor:pointer;width:fit-content">
                    <i class="bi bi-image me-1"></i><span th:text="#{profile.picture.choose}">Foto kiezen</span>
                    <input type="file" id="pictureInput" accept="image/*" class="d-none">
                </label>
                <form th:if="${hasPicture}" th:action="@{/profile/picture/reset}" method="post" class="d-inline">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit" class="btn btn-outline-danger btn-sm">
                        <i class="bi bi-trash me-1"></i><span th:text="#{profile.picture.reset}">Verwijderen</span>
                    </button>
                </form>
                <div class="text-muted small" th:text="#{profile.picture.hint}">Max. 2 MB · JPG, PNG of GIF</div>
            </div>
        </div>
    </div>

    <!-- Accountgegevens kaart met inline edit -->
    <div class="card shadow-sm mb-4">
        <div class="card-header fw-semibold">
            <i class="bi bi-person me-1"></i><span th:text="#{profile.info.title}">Accountgegevens</span>
        </div>
        <div class="card-body p-0">

            <!-- Gebruikersnaam rij -->
            <div class="profile-row px-4 py-3">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <div class="text-muted small mb-1" th:text="#{form.username}">Gebruikersnaam</div>
                        <div class="fw-semibold" th:text="${user.username}">username</div>
                    </div>
                    <button class="btn btn-sm btn-outline-secondary" type="button"
                            onclick="toggleEdit('username')" id="btnUsername">
                        <i class="bi bi-pencil me-1"></i><span th:text="#{profile.change.username}">Wijzigen</span>
                    </button>
                </div>
                <div id="editUsername" th:class="${openCard == 'username'} ? 'edit-panel mt-3' : 'edit-panel mt-3 d-none'">
                    <form th:action="@{/profile/username}" method="post" th:object="${changeUsernameForm}">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <div class="mb-3">
                            <label class="form-label small text-muted" th:text="#{profile.new.username}">Nieuwe gebruikersnaam</label>
                            <input type="text" th:field="*{newUsername}" class="form-control"
                                   th:classappend="${#fields.hasErrors('newUsername')} ? 'is-invalid'"
                                   th:placeholder="${user.username}" autofocus>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('newUsername')}"
                                 th:errors="*{newUsername}"></div>
                        </div>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-wc btn-sm" th:text="#{profile.save.username}">Opslaan</button>
                            <button type="button" class="btn btn-outline-secondary btn-sm" onclick="toggleEdit('username')" th:text="#{form.cancel}">Annuleren</button>
                        </div>
                    </form>
                </div>
            </div>

            <hr class="my-0 mx-4">

            <!-- E-mail rij -->
            <div class="profile-row px-4 py-3">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <div class="text-muted small mb-1" th:text="#{form.email}">E-mailadres</div>
                        <div class="fw-semibold" th:text="${user.email}">email</div>
                    </div>
                    <button class="btn btn-sm btn-outline-secondary" type="button"
                            onclick="toggleEdit('email')" id="btnEmail">
                        <i class="bi bi-pencil me-1"></i><span th:text="#{profile.change.email}">Wijzigen</span>
                    </button>
                </div>
                <div id="editEmail" th:class="${openCard == 'email'} ? 'edit-panel mt-3' : 'edit-panel mt-3 d-none'">
                    <form th:action="@{/profile/email}" method="post" th:object="${changeEmailForm}">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <div class="mb-3">
                            <label class="form-label small text-muted" th:text="#{profile.new.email}">Nieuw e-mailadres</label>
                            <input type="email" th:field="*{newEmail}" class="form-control"
                                   th:classappend="${#fields.hasErrors('newEmail')} ? 'is-invalid'"
                                   th:placeholder="${user.email}">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('newEmail')}"
                                 th:errors="*{newEmail}"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small text-muted" th:text="#{profile.confirm.email}">Bevestig e-mailadres</label>
                            <input type="email" th:field="*{confirmEmail}" class="form-control"
                                   th:classappend="${#fields.hasErrors('confirmEmail')} ? 'is-invalid'">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('confirmEmail')}"
                                 th:errors="*{confirmEmail}"></div>
                        </div>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-wc btn-sm" th:text="#{profile.save.username}">Opslaan</button>
                            <button type="button" class="btn btn-outline-secondary btn-sm" onclick="toggleEdit('email')" th:text="#{form.cancel}">Annuleren</button>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </div>

    <!-- Wachtwoord wijzigen kaart -->
    <div class="card shadow-sm mb-4">
        <div class="card-header fw-semibold d-flex justify-content-between align-items-center"
             onclick="toggleEdit('Password')" style="cursor:pointer">
            <span><i class="bi bi-lock me-1"></i><span th:text="#{profile.change.password}">Wachtwoord wijzigen</span></span>
            <i class="bi bi-chevron-down" id="btnPassword"></i>
        </div>
        <div id="editPassword" th:class="${openCard == 'password'} ? 'card-body px-4 py-3' : 'card-body px-4 py-3 d-none'">
            <form th:action="@{/profile/password}" method="post" th:object="${changePasswordForm}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <div class="mb-3">
                    <label class="form-label small text-muted" th:text="#{profile.current.password}">Huidig wachtwoord</label>
                    <input type="password" th:field="*{currentPassword}" class="form-control"
                           th:classappend="${#fields.hasErrors('currentPassword')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('currentPassword')}"
                         th:errors="*{currentPassword}"></div>
                </div>
                <div class="mb-3">
                    <label class="form-label small text-muted" th:text="#{profile.new.password}">Nieuw wachtwoord</label>
                    <input type="password" th:field="*{newPassword}" class="form-control"
                           th:classappend="${#fields.hasErrors('newPassword')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('newPassword')}"
                         th:errors="*{newPassword}"></div>
                </div>
                <div class="mb-4">
                    <label class="form-label small text-muted" th:text="#{profile.confirm.password}">Bevestig nieuw wachtwoord</label>
                    <input type="password" th:field="*{confirmPassword}" class="form-control"
                           th:classappend="${#fields.hasErrors('confirmPassword')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('confirmPassword')}"
                         th:errors="*{confirmPassword}"></div>
                </div>
                <button type="submit" class="btn btn-wc btn-sm" th:text="#{profile.save.username}">Opslaan</button>
            </form>
        </div>
    </div>

</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</div>

<!-- Crop modal -->
<div class="modal fade" id="cropModal" tabindex="-1" data-bs-backdrop="static">
    <div class="modal-dialog modal-dialog-centered" style="max-width:420px">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="bi bi-crop me-2"></i><span th:text="#{profile.picture.crop.title}">Foto bijsnijden</span></h5>
            </div>
            <div class="modal-body p-0" style="background:#111;max-height:380px;overflow:hidden">
                <img id="cropImage" src="" alt="crop" style="max-width:100%;display:block">
            </div>
            <div class="modal-footer justify-content-between">
                <button type="button" class="btn btn-outline-secondary" id="cropCancelBtn" th:text="#{form.cancel}">Annuleren</button>
                <button type="button" class="btn btn-wc" id="cropConfirmBtn">
                    <i class="bi bi-check-lg me-1"></i><span th:text="#{profile.picture.crop.confirm}">Opslaan</span>
                </button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>
<style>
/* Cirkel crop overlay */
.cropper-view-box,
.cropper-face {
    border-radius: 50%;
}
.cropper-view-box {
    outline: 2px solid #15803d;
    outline-color: rgba(21,128,61,.85);
}
.cropper-face {
    background-color: inherit;
}
</style>
<script>
function toggleEdit(field) {
    var key = field.charAt(0).toUpperCase() + field.slice(1);
    var panel = document.getElementById('edit' + key);
    var btn   = document.getElementById('btn' + key);
    if (panel) panel.classList.toggle('d-none');
    if (btn)   btn.classList.toggle('bi-chevron-down'), btn.classList.toggle('bi-chevron-up');
}
(function () {
    var input       = document.getElementById('pictureInput');
    var cropImage   = document.getElementById('cropImage');
    var cropModal   = new bootstrap.Modal(document.getElementById('cropModal'));
    var cropper     = null;

    input.addEventListener('change', function () {
        var file = this.files[0];
        if (!file) return;

        if (!file.type.startsWith('image/')) { alert('Alleen afbeeldingen toegestaan.'); return; }
        if (file.size > 2 * 1024 * 1024)    { alert('Bestand te groot (max. 2 MB).');   return; }

        var reader = new FileReader();
        reader.onload = function (e) {
            cropImage.src = e.target.result;
            cropModal.show();
            document.getElementById('cropModal').addEventListener('shown.bs.modal', function init() {
                this.removeEventListener('shown.bs.modal', init);
                if (cropper) { cropper.destroy(); cropper = null; }
                cropper = new Cropper(cropImage, {
                    aspectRatio: 1,
                    viewMode: 1,
                    dragMode: 'move',
                    autoCropArea: 0.85,
                    restore: false,
                    guides: false,
                    center: false,
                    highlight: false,
                    cropBoxMovable: false,
                    cropBoxResizable: false,
                    toggleDragModeOnDblclick: false,
                });
            });
        };
        reader.readAsDataURL(file);
        this.value = '';
    });

    document.getElementById('cropCancelBtn').addEventListener('click', function () {
        if (cropper) { cropper.destroy(); cropper = null; }
        cropModal.hide();
    });

    document.getElementById('cropConfirmBtn').addEventListener('click', function () {
        if (!cropper) return;
        var btn = this;
        btn.disabled = true;

        cropper.getCroppedCanvas({ width: 300, height: 300 }).toBlob(function (blob) {
            if (cropper) { cropper.destroy(); cropper = null; }
            cropModal.hide();
            btn.disabled = false;

            // Zet gecropte blob in het verborgen file-input via DataTransfer en submit
            var file = new File([blob], 'avatar.jpg', { type: 'image/jpeg' });
            var dt = new DataTransfer();
            dt.items.add(file);
            document.getElementById('hiddenFileInput').files = dt.files;
            document.getElementById('uploadForm').submit();
        }, 'image/jpeg', 0.9);
    });
})();
</script>
</body>
</html>
