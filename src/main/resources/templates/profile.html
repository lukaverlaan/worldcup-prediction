<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head(#{profile.title})}"></head>
<body class="app-body">

<div th:replace="~{fragments/layout :: sidebar}"></div>

<div class="page-wrapper">
<main class="main-container" style="max-width:600px">

    <h2 class="mb-4"><i class="bi bi-person-circle me-2 text-wc"></i><span th:text="#{profile.title}">Mijn Profiel</span></h2>

    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show">
        <span th:text="#{${successMessage}}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${pictureError}" class="alert alert-danger alert-dismissible fade show">
        <span th:text="#{${pictureError}}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Verborgen upload form (wordt programmatisch gesubmit na crop) -->
    <form id="uploadForm" th:action="@{/profile/picture}" method="post" enctype="multipart/form-data" style="display:none">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <input type="file" id="hiddenFileInput" name="picture">
    </form>

    <!-- Profielfoto kaart -->
    <div class="card shadow-sm mb-4">
        <div class="card-header fw-semibold">
            <i class="bi bi-camera me-1"></i><span th:text="#{profile.picture.title}">Profielfoto</span>
        </div>
        <div class="card-body d-flex align-items-center gap-4 flex-wrap">
            <img th:src="@{/profile/picture/{u}(u=${user.username},v=${pictureVersion})}"
                 alt="profielfoto" id="avatarPreview"
                 style="width:80px;height:80px;border-radius:50%;object-fit:cover;border:3px solid var(--wc-green);">
            <div class="d-flex flex-column gap-2">
                <label class="btn btn-outline-secondary mb-0" style="cursor:pointer;width:fit-content">
                    <i class="bi bi-image me-1"></i><span th:text="#{profile.picture.choose}">Foto kiezen</span>
                    <input type="file" id="pictureInput" accept="image/*" class="d-none">
                </label>
                <form th:if="${hasPicture}" th:action="@{/profile/picture/reset}" method="post" class="d-inline">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit" class="btn btn-outline-danger btn-sm">
                        <i class="bi bi-trash me-1"></i><span th:text="#{profile.picture.reset}">Verwijderen</span>
                    </button>
                </form>
                <div class="text-muted small" th:text="#{profile.picture.hint}">Max. 2 MB · JPG, PNG of GIF</div>
            </div>
        </div>
    </div>

    <div class="card shadow-sm mb-4">
        <div class="card-header fw-semibold">
            <i class="bi bi-person me-1"></i><span th:text="#{profile.info.title}">Accountgegevens</span>
        </div>
        <div class="card-body">
            <dl class="row mb-0">
                <dt class="col-sm-4" th:text="#{form.username}">Gebruikersnaam</dt>
                <dd class="col-sm-8 fw-bold" th:text="${user.username}">username</dd>
                <dt class="col-sm-4" th:text="#{form.email}">E-mail</dt>
                <dd class="col-sm-8" th:text="${user.email}">email</dd>
            </dl>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-header fw-semibold">
            <i class="bi bi-pencil me-1"></i><span th:text="#{profile.change.username}">Gebruikersnaam wijzigen</span>
        </div>
        <div class="card-body">
            <form th:action="@{/profile/username}" method="post" th:object="${changeUsernameForm}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <div class="mb-3">
                    <label class="form-label" th:text="#{profile.new.username}">Nieuwe gebruikersnaam</label>
                    <input type="text" th:field="*{newUsername}"
                           class="form-control"
                           th:classappend="${#fields.hasErrors('newUsername')} ? 'is-invalid'"
                           th:placeholder="${user.username}">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('newUsername')}"
                         th:errors="*{newUsername}"></div>
                </div>
                <button type="submit" class="btn btn-wc" th:text="#{profile.save.username}">Opslaan</button>
            </form>
        </div>
    </div>

</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</div>

<!-- Crop modal -->
<div class="modal fade" id="cropModal" tabindex="-1" data-bs-backdrop="static">
    <div class="modal-dialog modal-dialog-centered" style="max-width:420px">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="bi bi-crop me-2"></i><span th:text="#{profile.picture.crop.title}">Foto bijsnijden</span></h5>
            </div>
            <div class="modal-body p-0" style="background:#111;max-height:380px;overflow:hidden">
                <img id="cropImage" src="" alt="crop" style="max-width:100%;display:block">
            </div>
            <div class="modal-footer justify-content-between">
                <button type="button" class="btn btn-outline-secondary" id="cropCancelBtn" th:text="#{form.cancel}">Annuleren</button>
                <button type="button" class="btn btn-wc" id="cropConfirmBtn">
                    <i class="bi bi-check-lg me-1"></i><span th:text="#{profile.picture.crop.confirm}">Opslaan</span>
                </button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>
<style>
/* Cirkel crop overlay */
.cropper-view-box,
.cropper-face {
    border-radius: 50%;
}
.cropper-view-box {
    outline: 2px solid #15803d;
    outline-color: rgba(21,128,61,.85);
}
.cropper-face {
    background-color: inherit;
}
</style>
<script>
(function () {
    var input       = document.getElementById('pictureInput');
    var cropImage   = document.getElementById('cropImage');
    var cropModal   = new bootstrap.Modal(document.getElementById('cropModal'));
    var cropper     = null;

    input.addEventListener('change', function () {
        var file = this.files[0];
        if (!file) return;

        if (!file.type.startsWith('image/')) { alert('Alleen afbeeldingen toegestaan.'); return; }
        if (file.size > 2 * 1024 * 1024)    { alert('Bestand te groot (max. 2 MB).');   return; }

        var reader = new FileReader();
        reader.onload = function (e) {
            cropImage.src = e.target.result;
            cropModal.show();
            document.getElementById('cropModal').addEventListener('shown.bs.modal', function init() {
                this.removeEventListener('shown.bs.modal', init);
                if (cropper) { cropper.destroy(); cropper = null; }
                cropper = new Cropper(cropImage, {
                    aspectRatio: 1,
                    viewMode: 1,
                    dragMode: 'move',
                    autoCropArea: 0.85,
                    restore: false,
                    guides: false,
                    center: false,
                    highlight: false,
                    cropBoxMovable: false,
                    cropBoxResizable: false,
                    toggleDragModeOnDblclick: false,
                });
            });
        };
        reader.readAsDataURL(file);
        this.value = '';
    });

    document.getElementById('cropCancelBtn').addEventListener('click', function () {
        if (cropper) { cropper.destroy(); cropper = null; }
        cropModal.hide();
    });

    document.getElementById('cropConfirmBtn').addEventListener('click', function () {
        if (!cropper) return;
        var btn = this;
        btn.disabled = true;

        cropper.getCroppedCanvas({ width: 300, height: 300 }).toBlob(function (blob) {
            if (cropper) { cropper.destroy(); cropper = null; }
            cropModal.hide();
            btn.disabled = false;

            // Zet gecropte blob in het verborgen file-input via DataTransfer en submit
            var file = new File([blob], 'avatar.jpg', { type: 'image/jpeg' });
            var dt = new DataTransfer();
            dt.items.add(file);
            document.getElementById('hiddenFileInput').files = dt.files;
            document.getElementById('uploadForm').submit();
        }, 'image/jpeg', 0.9);
    });
})();
</script>
</body>
</html>
