privacy.section.controller=1. Data Controller
privacy.controller.text=This website is operated by Luka Verlaan (lukaverlaan.be). You can contact the data controller via verlaanluka@gmail.com.
privacy.section.data=2. Data Collected
privacy.data.text=The following personal data is collected when you register or use the site:
privacy.data.item1=Username and email address (upon registration)
privacy.data.item2=Predictions and scores you submit
privacy.data.item3=Usage data (pages visited, browser type) via Google Analytics
privacy.section.purpose=3. Purpose
privacy.purpose.text=Your data is collected solely to run the World Cup 2026 Prediction competition — to manage your account, track predictions, and display rankings.
privacy.section.adsense=4. Google AdSense & Cookies
privacy.adsense.text=This site uses Google AdSense to display advertisements. Google may use cookies to show personalized ads based on your browsing behaviour. These are third-party cookies managed by Google. You can opt out via Google's ad settings or the IAB consent framework.
privacy.section.rights=5. Your Rights (GDPR)
privacy.rights.intro=Under the GDPR you have the following rights:
privacy.rights.access=Right of access — you may request a copy of the data we hold about you
privacy.rights.deletion=Right to erasure — you may request deletion of your account and personal data
privacy.rights.objection=Right to object — you may object to processing of your data for advertising purposes
